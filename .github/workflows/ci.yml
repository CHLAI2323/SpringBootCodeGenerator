name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: "17"
      - name: Build
        run: mvn clean package -DskipTests
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: target/*.jar

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: "17"
      - name: Run unit tests
        run: mvn test
      - name: Generate code coverage report
        run: mvn jacoco:report
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/**

  deployment:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: target
      - name: Deploy application
        run: |
          JAR_FILE=$(ls target/*.jar | head -n 1)
          nohup java -jar "$JAR_FILE" > app.log 2>&1 &
          sleep 10
          curl http://localhost:1234 || exit 1
      - name: Upload deployment logs
        uses: actions/upload-artifact@v4
        with:
          name: deployment-log
          path: app.log